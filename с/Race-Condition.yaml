rules:
  - id: Possible-Race-Condition
    metadata:
      author: Victor 4ernyak <https://t.me/iter_malum>
      confidence: MEDIUM
      category: security
      cwe:
        - "CWE-366: Race Condition within a Thread"
        - "CWE-367: Time-of-check Time-of-use (TOCTOU)"
        - "CWE-362: Concurrent Execution using Shared Resource"
      vulnerability_class:
        - Concurrency
      owasp:
        - A05:2021 - Security Misconfiguration
      references:
        - https://cwe.mitre.org/data/definitions/366.html
        - https://cwe.mitre.org/data/definitions/367.html
        - https://cwe.mitre.org/data/definitions/362.html
      technology:
        - c
        - cpp
    languages:
      - c
      - cpp
    severity: WARNING
    message: >
      Potential race condition detected. Multiple threads may access shared 
      resources without proper synchronization, leading to undefined behavior, 
      data corruption, or security vulnerabilities. Use mutexes, atomic 
      operations, or other synchronization primitives to protect shared state.
    pattern-either:
      # ============================================================
      # 1. TOCTOU (Time-of-check Time-of-use) — только критичные операции
      # ============================================================
      - patterns:
        - pattern-either:
          - pattern: |
              if (access($PATH, $MODE) == 0) {
                ...
                fopen($PATH, $MODE);
              }
          - pattern: |
              if (stat($PATH, $BUF) == 0) {
                ...
                unlink($PATH);
              }
          - pattern: |
              if (lstat($PATH, $BUF) == 0) {
                ...
                rename($PATH, $NEW_PATH);
              }
        - pattern-not-inside: |
            pthread_mutex_lock(...);
            ...
            if (...) {
              ...
            }
            ...
            pthread_mutex_unlock(...);
        - pattern-not-inside: |
            std::lock_guard<...> ...;
            ...
            if (...) {
              ...
            }
      
      # ============================================================
      # 2. Глобальные/статические переменные в неатомарных операциях
      # ============================================================
      - patterns:
        - pattern-either:
          - pattern: $GLOBAL++
          - pattern: $GLOBAL--
          - pattern: ++$GLOBAL
          - pattern: --$GLOBAL
          - pattern: $GLOBAL += $EXPR
          - pattern: $GLOBAL -= $EXPR
        - metavariable-regex:
            metavariable: $GLOBAL
            regex: '^(g_|global_|s_|static_).*'
        - pattern-not-inside: |
            pthread_mutex_lock(...);
            ...
            $GLOBAL...;
            ...
            pthread_mutex_unlock(...);
        - pattern-not-inside: |
            std::lock_guard<...> ...;
            ...
            $GLOBAL...;
        - pattern-not-inside: |
            std::atomic<...> $GLOBAL;
      
      # ============================================================
      # 3. Use-after-free паттерны
      # ============================================================
      - patterns:
        - pattern: |
            if ($PTR != NULL) {
              ...
              free($PTR);
            }
            ...
            if ($PTR != NULL) {
              ...
              $USE = $PTR->...;
            }
        - pattern-not-inside: |
            pthread_mutex_lock(...);
            ...
            free($PTR);
            ...
            pthread_mutex_unlock(...);
      
      # ============================================================
      # 4. Ленивая инициализация синглтонов
      # ============================================================
      - patterns:
        - pattern: |
            if ($INSTANCE == NULL) {
              $INSTANCE = new $TYPE(...);
            }
        - pattern-not-inside: |
            std::call_once($FLAG, ...);
        - pattern-not-inside: |
            pthread_once(&$ONCE, ...);
        - pattern-not-inside: |
            std::lock_guard<...> ...;
            ...
            if ($INSTANCE == NULL) {
              ...
            }
      
      # ============================================================
      # 5. Опасные вызовы функций окружения
      # ============================================================
      - patterns:
        - pattern-either:
          - pattern: setenv($NAME, $VALUE, $OVR)
          - pattern: putenv($STRING)
          - pattern: unsetenv($NAME)
        - pattern-not-inside: |
            pthread_mutex_lock(...);
            ...
            setenv(...);
            ...
            pthread_mutex_unlock(...);
      
      # ============================================================
      # 6. Опасные операции с файловыми дескрипторами
      # ============================================================
      - patterns:
        - pattern-either:
          - pattern: |
              if ($COND) {
                ...
                close($FD);
              }
              ...
              close($FD);
          - pattern: |
              if ($COND) {
                ...
                fclose($FP);
              }
              ...
              fclose($FP);
        - pattern-not-inside: |
            pthread_mutex_lock(...);
            ...
            close($FD);
            ...
            pthread_mutex_unlock(...);
      
      # ============================================================
      # 7. Гонки с signal/sigaction
      # ============================================================
      - patterns:
        - pattern-either:
          - pattern: signal($SIG, $HANDLER)
          - pattern: sigaction($SIG, $ACT, $OACT)
        - pattern-not-inside: |
            pthread_mutex_lock(...);
            ...
            signal($SIG, $HANDLER);
            ...
            pthread_mutex_unlock(...);