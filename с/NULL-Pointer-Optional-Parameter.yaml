rules:
  - id: NULL-Pointer-Optional-Parameter
    metadata:
      author: Victor 4ernyak
      confidence: HIGH
      category: security
      cwe:
        - "CWE-476: NULL Pointer Dereference"
      technology:
        - c
        - cpp
      subcategory:
        - vuln
      likelihood: MEDIUM
      impact: HIGH
    languages:
      - c
      - cpp
    severity: ERROR
    message: Optional parameter $PTR (marked as nullable) dereferenced without NULL check
    patterns:
      - pattern-inside: |
          $RET $FUNC(..., $TYPE *$PTR, ...) {
            ...
          }
      - metavariable-regex:
          metavariable: $PTR
          regex: '(?i)(optional|maybe|nullable|opt_|p_|may_null)'
      - pattern-either:
          - pattern: $PTR->$FIELD
          - pattern: $PTR->$FIELD = $VALUE
          - pattern: $PTR[$INDEX]
          - pattern: $PTR[$INDEX] = $VALUE
          - pattern: $PTR = $VALUE
          - pattern: $PTR + $OFFSET
          - pattern: $PTR++
          - pattern: ++$PTR
          - pattern: strcpy($PTR, ...)
          - pattern: strlen($PTR)
          - pattern: strcmp($PTR, ...)
          - pattern: printf($PTR, ...)
          - pattern: free($PTR)
      - pattern-not-inside: |
          if ($PTR == NULL) { ... }
      - pattern-not-inside: |
          if ($PTR == NULL) { ... }
          ...
      - pattern-not-inside: |
          if ($PTR != NULL) { ... }
      - pattern-not-inside: |
          if ($PTR != NULL) { ... }
          ...
      - pattern-not-inside: |
          if (!$PTR) { ... }
      - pattern-not-inside: |
          if (!$PTR) { ... }
          ...
      - pattern-not-inside: |
          if ($PTR) { ... }
      - pattern-not-inside: |
          if ($PTR) { ... }
          ...
      - pattern-not-inside: |
          assert($PTR != NULL)
      - pattern-not-inside: |
          assert($PTR != NULL)
          ...