rules:
  - id: NULL-Pointer-Calloc
    metadata:
      author: Victor 4ernyak
      confidence: HIGH
      category: security
      cwe:
        - "CWE-476: NULL Pointer Dereference"
      technology:
        - c
        - cpp
      subcategory:
        - vuln
      likelihood: MEDIUM
      impact: HIGH
    languages:
      - c
      - cpp
    severity: ERROR
    message: calloc result used without NULL check
    patterns:
      - pattern: |
          $PTR = calloc(...);
          ...
      - pattern-either:
          - pattern: $PTR->$FIELD
          - pattern: $PTR->$FIELD = $VALUE
          - pattern: $PTR[$INDEX]
          - pattern: $PTR[$INDEX] = $VALUE
          - pattern: $PTR = $VALUE
          - pattern: $PTR + $OFFSET
          - pattern: $PTR++
          - pattern: ++$PTR
          - pattern: strcpy($PTR, ...)
          - pattern: strncpy($PTR, ...)
          - pattern: memcpy($PTR, ...)
          - pattern: memset($PTR, ...)
          - pattern: sprintf($PTR, ...)
          - pattern: snprintf($PTR, ...)
          - pattern: strlen($PTR)
          - pattern: strcmp($PTR, ...)
          - pattern: free($PTR)
          - pattern: $FUNC(&$PTR, ...)
      - pattern-not-inside: |
          if ($PTR == NULL) { ... }
      - pattern-not-inside: |
          if ($PTR != NULL) { ... }
      - pattern-not-inside: |
          if (!$PTR) { ... }
      - pattern-not-inside: |
          if ($PTR) { ... }
      - pattern-not-inside: |
          assert($PTR != NULL)