rules:
  - id: NULL-Pointer-GetenV
    metadata:
      author: Victor 4ernyak
      confidence: HIGH
      category: security
      cwe:
        - "CWE-476: NULL Pointer Dereference"
      technology:
        - c
        - cpp
      subcategory:
        - vuln
      likelihood: MEDIUM
      impact: HIGH
    languages:
      - c
      - cpp
    severity: ERROR
    message: getenv result used without NULL check
    patterns:
      - pattern: |
          $PTR = getenv(...);
          ...
      - pattern-either:
          - pattern: $PTR->$FIELD
          - pattern: $PTR[$INDEX]
          - pattern: $PTR = $VALUE
          - pattern: $PTR + $OFFSET
          - pattern: $PTR++
          - pattern: ++$PTR
          - pattern: strcpy($PTR, ...)
          - pattern: strncpy($PTR, ...)
          - pattern: strcat($PTR, ...)
          - pattern: strlen($PTR)
          - pattern: strcmp($PTR, ...)
          - pattern: strncmp($PTR, ...)
          - pattern: printf($PTR, ...)
          - pattern: sprintf($PTR, ...)
          - pattern: atoi($PTR)
          - pattern: atol($PTR)
          - pattern: atoll($PTR)
          - pattern: strtol($PTR, ...)
          - pattern: strtoul($PTR, ...)
          - pattern: strtod($PTR, ...)
          - pattern: strtof($PTR, ...)
          - pattern: $FUNC(&$PTR, ...)
      - pattern-not-inside: |
          if ($PTR == NULL) { ... }
      - pattern-not-inside: |
          if ($PTR == NULL) { ... }
          ...
      - pattern-not-inside: |
          if ($PTR != NULL) { ... }
      - pattern-not-inside: |
          if ($PTR != NULL) { ... }
          ...
      - pattern-not-inside: |
          if (!$PTR) { ... }
      - pattern-not-inside: |
          if (!$PTR) { ... }
          ...
      - pattern-not-inside: |
          if ($PTR) { ... }
      - pattern-not-inside: |
          if ($PTR) { ... }
          ...
      - pattern-not-inside: |
          assert($PTR != NULL)
      - pattern-not-inside: |
          assert($PTR != NULL)
          ...