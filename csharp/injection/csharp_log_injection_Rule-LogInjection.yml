rules:
- id: csharp_log_injection_Rule-LogInjection
  severity: WARNING
  languages:
  - csharp
  metadata:
    author: "Victor 4ernyak <https://t.me/iter_malum>"
    cwe: "CWE-117: Improper Output Neutralization for Logs"
    owasp: "A09:2021-Security Logging and Monitoring Failures"
    category: security
    technology:
    - .net
    confidence: MEDIUM
  message: "[Log Injection] User-controlled data written to log without sanitization. Use structured logging with parameters."
  
  patterns:
  - pattern-either:
    # Опасные паттерны
    - patterns:
      - pattern-either:
        - pattern: $LOG.LogInformation($X)
        - pattern: $LOG.LogDebug($X)
        - pattern: $LOG.LogWarning($X)
        - pattern: $LOG.LogError($X)
        - pattern: $LOG.LogCritical($X)
        - pattern: _logger.LogInformation($X)
        - pattern: _logger.LogDebug($X)
        - pattern: _logger.LogWarning($X)
        - pattern: _logger.LogError($X)
        - pattern: _logger.LogCritical($X)
        - pattern: Console.WriteLine($X)
        - pattern: System.Diagnostics.Debug.WriteLine($X)
        - pattern: System.Diagnostics.Trace.WriteLine($X)
        - pattern: eventLog.WriteEntry($X)
        - pattern: $WRITER.WriteLine($X)
      # Исключаем константные строки
      - pattern-not: |
          $LOG.LogInformation("...")
      - pattern-not: |
          $LOG.LogDebug("...")
      - pattern-not: |
          $LOG.LogWarning("...")
      - pattern-not: |
          $LOG.LogError("...")
      - pattern-not: |
          $LOG.LogCritical("...")
      - pattern-not: |
          _logger.LogInformation("...")
      - pattern-not: |
          _logger.LogDebug("...")
      - pattern-not: |
          _logger.LogWarning("...")
      - pattern-not: |
          _logger.LogError("...")
      - pattern-not: |
          _logger.LogCritical("...")
      - pattern-not: |
          Console.WriteLine("...")
      - pattern-not: |
          System.Diagnostics.Debug.WriteLine("...")
      - pattern-not: |
          System.Diagnostics.Trace.WriteLine("...")
      - pattern-not: |
          eventLog.WriteEntry("...")
      # Исключаем интерполяцию строк (безопасно)
      - pattern-not: |
          $LOG.LogInformation($"...")
      - pattern-not: |
          $LOG.LogDebug($"...")
      - pattern-not: |
          $LOG.LogWarning($"...")
      - pattern-not: |
          $LOG.LogError($"...")
      - pattern-not: |
          $LOG.LogCritical($"...")
      - pattern-not: |
          _logger.LogInformation($"...")
      - pattern-not: |
          _logger.LogDebug($"...")
      - pattern-not: |
          _logger.LogWarning($"...")
      - pattern-not: |
          _logger.LogError($"...")
      - pattern-not: |
          _logger.LogCritical($"...")
      # Исключаем структурированное логирование
      - pattern-not-inside: |
          $LOG.LogInformation("...", $PARAM)
      - pattern-not-inside: |
          $LOG.LogDebug("...", $PARAM)
      - pattern-not-inside: |
          $LOG.LogWarning("...", $PARAM)
      - pattern-not-inside: |
          $LOG.LogError("...", $PARAM)
      - pattern-not-inside: |
          $LOG.LogCritical("...", $PARAM)
      - pattern-not-inside: |
          _logger.LogInformation("...", $PARAM)
      - pattern-not-inside: |
          _logger.LogDebug("...", $PARAM)
      - pattern-not-inside: |
          _logger.LogWarning("...", $PARAM)
      - pattern-not-inside: |
          _logger.LogError("...", $PARAM)
      - pattern-not-inside: |
          _logger.LogCritical("...", $PARAM)
      # Исключаем санитизированные строки
      - pattern-not-inside: |
          $X.Replace("\n", "")
      - pattern-not-inside: |
          $X.Replace("\r", "")
      - pattern-not-inside: |
          $X.Replace(Environment.NewLine, "")
    
    # Логирование после конкатенации через переменную
    - patterns:
      - pattern: |
          string $VAR = $X + $Y;
          ...
          $LOG.LogInformation($VAR)
      - pattern-not: |
          $LOG.LogInformation("...")
    
    # Логирование через StringBuilder
    - patterns:
      - pattern: |
          StringBuilder $SB = new StringBuilder();
          $SB.Append($X);
          ...
          $LOG.LogInformation($SB.ToString())
      - pattern-not: |
          $LOG.LogInformation("...")
    
    # Логирование через string.Format
    - patterns:
      - pattern: |
          string $VAR = string.Format($FORMAT, $X);
          ...
          $LOG.LogInformation($VAR)
      - pattern-not: |
          $LOG.LogInformation("...")