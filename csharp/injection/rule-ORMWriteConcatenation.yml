# yamllint disable
# License: MIT
# yamllint enable
---
rules:
- id: rule-ORMWriteConcatenation
  mode: taint
  pattern-sources:
    - patterns:
        - pattern: |
            (string $X)
        - pattern-not: |
            "..."
  
  pattern-propagators:
    - pattern: (StringBuilder $B).$ANY(...,(string $X),...)
      from: $X
      to: $B
    - pattern: string.Format($FORMAT, $...ARGS)
      from: $...ARGS
      to: $PROPAGATOR
    - pattern: $"$EXPR"
      from: $EXPR
      to: $PROPAGATOR
    - pattern: $STR1 + $STR2
      from: $STR1
      to: $PROPAGATOR
    - pattern: $STR1 + $STR2
      from: $STR2
      to: $PROPAGATOR
    - pattern: string.Concat($...ARGS)
      from: $...ARGS
      to: $PROPAGATOR
    - pattern: (StringBuilder $B).ToString()
      from: $B
      to: $PROPAGATOR
  
  pattern-sinks:
    - patterns:
        - pattern-either:
            # EF Core
            - pattern: $X.Database.ExecuteSqlRaw($ARG, ...)
            - pattern: $X.Database.ExecuteSqlRawAsync($ARG, ...)
            - pattern: $X.Database.ExecuteSqlInterpolated($ARG, ...)
            - pattern: $X.Database.ExecuteSqlInterpolatedAsync($ARG, ...)
            # Dapper
            - pattern: $X.Execute($ARG, ...)
            - pattern: $X.ExecuteAsync($ARG, ...)
            - pattern: $X.Query($ARG, ...)
            - pattern: $X.QueryFirst($ARG, ...)
            - pattern: $X.QueryFirstOrDefault($ARG, ...)
            - pattern: $X.QuerySingle($ARG, ...)
            - pattern: $X.QuerySingleOrDefault($ARG, ...)
            - pattern: $X.QueryMultiple($ARG, ...)
            - pattern: $X.ExecuteScalar($ARG, ...)
            - pattern: $X.ExecuteReader($ARG, ...)
            # NHibernate
            - pattern: $X.CreateSQLQuery($ARG)
            - pattern: $X.CreateSQLQuery($ARG).ExecuteUpdate()
            - pattern: $X.CreateNativeQuery($ARG)
        - focus-metavariable: $ARG
  
  pattern-sanitizers:
    - pattern: $X.Execute($ARG, $PARAM)
      by-side-effect: true
    - pattern: $X.ExecuteAsync($ARG, $PARAM)
      by-side-effect: true
    - pattern: $X.Query($ARG, $PARAM)
      by-side-effect: true
    - pattern: $X.ExecuteSqlRaw($ARG, $PARAM)
      by-side-effect: true
    - pattern: $X.ExecuteSqlInterpolated($"...")
      by-side-effect: true
    - pattern: $X.CreateSQLQuery($ARG).SetParameter($NAME, $VALUE)
      by-side-effect: true
    # Исключения для LDAP
    - pattern: LdapConnection.Search(...)
      by-side-effect: true
    - pattern: $X.BuildSearchQueue(...)
      by-side-effect: true
    - pattern: $X.FindAll(...)
      by-side-effect: true
    - pattern: $X.SearchSingle(...)
      by-side-effect: true
    - pattern: LdapConnection.Connect(...)
      by-side-effect: true
    - pattern: $X.RetryPolicy.Execute(...)
      by-side-effect: true
    - pattern: $X.Dispose(...)
      by-side-effect: true
    - pattern: $X.Connect(...)
      by-side-effect: true
    - pattern: $X.GetMainGroupDistinguishedName(...)
      by-side-effect: true
    - pattern: $X.GetResponse(...)
      by-side-effect: true
    - pattern: $X.Bind(...)
      by-side-effect: true
    - pattern: new LdapConnection()
      by-side-effect: true
    - pattern: LdapConnection.DefaultPort
      by-side-effect: true
  
  message: "Обнаружено опасное использование ORM методов с динамически формируемыми SQL запросами. Методы ExecuteSqlRaw, ExecuteSqlInterpolated (EF Core), Execute, Query (Dapper), CreateSQLQuery (NHibernate) для модификации данных становятся уязвимыми для SQL инъекции, если в них передается динамически сформированная строка с пользовательским вводом. Исправление: всегда используйте параметризованные запросы."
  
  metadata:
    author: "Victor 4ernyak <https://t.me/iter_malum>"
    category: "security"
    technology:
      - "csharp"
      - "entity-framework-core"
      - "dapper"
      - "nhibernate"
    owasp:
      - "A01:2017 - Injection"
      - "A03:2021 - Injection"
    cwe:
      - "CWE-89"
    confidence: "HIGH"
    subcategory:
      - "audit"
    likelihood: "HIGH"
    impact: "HIGH"
  
  languages:
    - "csharp"
  severity: "ERROR"