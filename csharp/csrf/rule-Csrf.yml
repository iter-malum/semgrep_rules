rules:
  - id: csharp_csrf_rule-ValidateAntiForgeryToken
    languages:
      - csharp
    patterns:
      - pattern-either:
          - pattern: |
              [HttpPost]
              public $RET $FOO(...) {
                ...
              }
          - pattern: |
              [HttpPut]
              public $RET $FOO(...) {
                ...
              }
          - pattern: |
              [HttpDelete]
              public $RET $FOO(...) {
                ...
              }
          - pattern: |
              [HttpPatch]
              public $RET $FOO(...) {
                ...
              }
      - pattern-not: |
          [ValidateAntiForgeryToken]
          public $RET $FOO(...) {
            ...
          }
      - pattern-not: |
          [AutoValidateAntiforgeryToken]
          public $RET $FOO(...) {
            ...
          }
      - pattern-not: |
          [ServiceFilter(typeof(AntiforgeryFilter))]
          public $RET $FOO(...) {
            ...
          }
      - pattern-not-inside: |
          [AutoValidateAntiforgeryToken]
          class $CONTROLLER : Controller {
            ...
          }
      - pattern-not: |
          [HttpGet]
          public $RET $FOO(...) {
            ...
          }
    message: >
      CSRF protection missing on state-changing HTTP method.


      **CRITICAL:** 

      - `[ValidateAntiForgeryToken]` on a controller class does NOT
      automatically apply to its methods in ASP.NET Core!

      - `[IgnoreAntiforgeryToken]` disables CSRF protection - this is DANGEROUS
      and should be reviewed.

      - Only `[AutoValidateAntiforgeryToken]` on a controller class provides
      automatic protection.


      **Fix:** Add `[ValidateAntiForgeryToken]` attribute to this method.
    severity: WARNING
    metadata:
      author: Victor 4ernyak <https://t.me/iter_malum>
      shortDescription: Missing CSRF protection
      category: security
      owasp:
        - A5:2017-Broken Access Control
        - A01:2021-Broken Access Control
      cwe: CWE-352
      security-severity: Medium
      subcategory:
        - vuln
      confidence: LOW
      likelihood: MEDIUM
      impact: LOW