rules:
  - id: disabled-obfuscation-code
    message: Code obfuscation is disabled! Build without --obfuscate flag makes the
      app vulnerable to reverse engineering.
    languages:
      - dart
    severity: WARNING
    patterns:
      - pattern-either:
          - pattern-regex: //.*flutter build
              (?!.*--obfuscate).*(apk|appbundle|ios|ipa|linux|macos|windows|aar)
          - pattern-regex: /\*.*flutter build
              (?!.*--obfuscate).*(apk|appbundle|ios|ipa|linux|macos|windows|aar).*\*/
          - pattern-regex: \".*flutter build
              (?!.*--obfuscate).*(apk|appbundle|ios|ipa|linux|macos|windows|aar).*\"
          - pattern-regex: \:.*flutter build
              (?!.*--obfuscate).*(apk|appbundle|ios|ipa|linux|macos|windows|aar).*\"
