rules:
  - id: dart-hardcoded-secrets-universal
    message: 'Hardcoded Secret detected! Variable: $KEY, Value: $SECRET. Use --dart-define or flutter_dotenv instead.'
    metadata:
      category: security
      author: Victor 4ernyak <https://t.me/iter_malum>
      confidence: HIGH
      subcategory: secrets
      cwe: 'CWE-798: Use of Hard-coded Credentials'
      owasp: 'A07:2021 - Identification and Authentication Failures'
      technology:
        - dart
        - flutter
      likelihood: HIGH
      impact: HIGH
      confidence: MEDIUM
    languages:
      - dart
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: 'final String $KEY = $SECRET;'
          - pattern: 'const String $KEY = $SECRET;'
          - pattern: 'var $KEY = $SECRET;'
          - pattern: 'String $KEY = $SECRET;'
          - pattern: 'final $KEY = $SECRET;'
          - pattern: 'const $KEY = $SECRET;'
          - pattern: 'String _$KEY = $SECRET;'
          - pattern: 'final String _$KEY = $SECRET;'
          - pattern: '$KEY = String.fromEnvironment($ARG, defaultValue: $SECRET);'
          - pattern: 'String $KEY = String.fromEnvironment($ARG, defaultValue: $SECRET);'
          - pattern: 'final String $KEY = String.fromEnvironment($ARG, defaultValue: $SECRET);'
          - pattern: '{ $KEY: $SECRET }'
          - pattern: 'var $MAP = { $KEY: $SECRET };'
          - pattern: 'final $MAP = { $KEY: $SECRET };'
          - pattern: 'Map<String, dynamic> $MAP = { $KEY: $SECRET };'
          - pattern: 'Map<String, String> $MAP = { $KEY: $SECRET };'
          - pattern: '{ ..., $KEY: $SECRET, ... }'
          - pattern: 'var $MAP = { ..., $KEY: $SECRET, ... };'
          - pattern: 'final $MAP = { ..., $KEY: $SECRET, ... };'
          - pattern: 'Map<String, dynamic> $MAP = { ..., $KEY: $SECRET, ... };'
          - pattern: 'Map<String, String> $MAP = { ..., $KEY: $SECRET, ... };'
          - patterns:
              - pattern: 'String $KEY = $SECRET;'
              - pattern-inside: |
                  $FUNC(...) {
                    ...
                  }
          - patterns:
              - pattern: 'var $KEY = $SECRET;'
              - pattern-inside: |
                  $FUNC(...) {
                    ...
                  }
          - patterns:
              - pattern: 'final $KEY = $SECRET;'
              - pattern-inside: |
                  $FUNC(...) {
                    ...
                  }
      - metavariable-regex:
          metavariable: $KEY
          regex: '(?i).*(api[_-]?key|apikey|token|secret|password|pass|auth|credential|private[_-]?key|aws|stripe|firebase|access[_-]?key).*'
      - pattern-not-regex: '.*YOUR_[A-Z_]+_HERE.*'
      - pattern-not-regex: '.*CHANGE_ME.*'
      - pattern-not-regex: '.*INSERT_[A-Z_]+_HERE.*'
      - pattern-not-regex: '.*EXAMPLE_[A-Z_]+.*'
      - pattern-not-regex: '.*test_[a-z_]+.*'
      - pattern-not-regex: '.*xxx.*'
      - pattern-not-regex: '.*foo.*'
      - pattern-not-regex: '.*bar.*'
      - pattern-not-regex: '.*placeholder.*'
      - pattern-not-regex: '.*dummy.*'
      - pattern-not-regex: '.*sample.*'
      - pattern-not-regex: '.*mock.*'
      - pattern-not-regex: '.*fake.*'