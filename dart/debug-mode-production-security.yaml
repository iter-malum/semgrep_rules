rules:
  - id: debug-mode-production-security
    metadata:
      category: security
      author: Victor 4ernyak <https://t.me/iter_malum>
      confidence: HIGH
    message: 'Debug mode security bypass detected! Using kDebugMode in security-critical checks. Debug mode should never bypass authentication, authorization, validation, or other security controls in production code.'
    languages:
      - dart
    severity: ERROR
    patterns:
      - pattern-either:
          # Прямое использование kDebugMode в возврате true
          - pattern: 'if (kDebugMode) return true;'
          - pattern: 'if (kDebugMode == true) return true;'
          - pattern: 'if (true == kDebugMode) return true;'
          - pattern: 'if (kDebugMode) { return true; }'
          
          # Тернарный оператор с true
          - pattern: 'kDebugMode ? true : $ELSE'
          - pattern: 'kDebugMode == true ? true : $ELSE'
          
          # Присваивание
          - pattern: '$VAR = kDebugMode;'
          - pattern: 'final $VAR = kDebugMode;'
          - pattern: 'const $VAR = kDebugMode;'
          
          # Логические операторы
          - pattern: 'kDebugMode || $COND'
          - pattern: 'kDebugMode && $COND'
          - pattern: '$COND || kDebugMode'
          - pattern: '$COND && kDebugMode'
          
          # kReleaseMode инверсия
          - pattern: 'if (!kReleaseMode) return true;'
          - pattern: 'if (!kReleaseMode) { return true; }'
          - pattern: '!kReleaseMode ? true : $ELSE'
          - pattern: '$VAR = !kReleaseMode;'
          
          # kProfileMode
          - pattern: 'if (kProfileMode) return true;'
          - pattern: 'if (kProfileMode) return $FUNC(...);'
          - pattern: 'if (kDebugMode) yield true'
          - pattern: 'if (!kReleaseMode) return $FUNC(...);'
          - pattern: 'if (kDebugMode) return $FUNC(...);'
          - pattern: 'if (kDebugMode) return hasPermission(...,$VAR,...);'
          - pattern: 'if (kDebugMode) return $FUNC(...,$VAR,...);'
          - pattern: 'if (kProfileMode) { return true; }'
          - pattern: 'kProfileMode ? true : $ELSE'
          - pattern: '$VAR = kProfileMode;'
          
          # Комбинированные режимы
          - pattern: 'if (kDebugMode || kProfileMode) return true;'
          - pattern: '(kDebugMode || kProfileMode) ? true : $ELSE'
          - pattern: '!kReleaseMode ? true : $ELSE'
          
          # Множественные условия
          - pattern: 'if (kDebugMode || $COND1 || $COND2) return true;'
          - pattern: 'if (!kReleaseMode && $COND) return true;'
      
      # Исключения для безопасных случаев
      - pattern-not: 'if (kDebugMode) print(...);'
      - pattern-not: 'if (kDebugMode) debugPrint(...);'
      - pattern-not: 'if (kDebugMode) log(...);'
      - pattern-not-regex: '.*//.*ignore:.*debug.*'
      - pattern-not-regex: '.*@visibleForTesting.*'