rules:
  - id: disabled-obfuscation-json
    message: 'Code obfuscation is disabled! Build without --obfuscate flag makes the app vulnerable to reverse engineering.'
    languages:
      - json
    severity: WARNING
    patterns:
      - pattern-either:
          # VS Code tasks
          - pattern-regex: '"command":.*"flutter build (?!.*--obfuscate).*(apk|appbundle|ios|ipa|linux|macos|windows|aar)"'
          # package.json scripts
          - pattern-regex: '"build":.*"flutter build (?!.*--obfuscate).*(apk|appbundle|ios|ipa|linux|macos|windows|aar)"'